app = "distillery-tinyfable"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DISTILLERY_DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "distillery_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
