<template id="cold-open-template">
  <div data-composition-id="cold-open" data-width="1920" data-height="1080" data-start="0" data-duration="5.5">
    <div class="co-rule co-rule-t"></div>
    <div class="co-rule co-rule-b"></div>
    <div class="co-meta co-meta-tl">&dagger; EXHIBIT A &middot; THE BILL</div>
    <div class="co-meta co-meta-tr">01 / 07</div>

    <div class="co-headline">
      <span class="co-w">Every</span>
      <span class="co-w">workflow</span>
      <span class="co-w">call</span>
      <span class="co-w">goes</span>
      <span class="co-w">to</span>
      <span class="co-w co-w-accent">a</span>
      <span class="co-w co-w-accent">frontier</span>
      <span class="co-w co-w-accent">model.</span>
    </div>

    <div class="co-ledger">
      <div class="co-ledger-row"><span>normalize transaction 000001</span><i></i><span>frontier teacher</span></div>
      <div class="co-ledger-row"><span>normalize transaction 000002</span><i></i><span>frontier teacher</span></div>
      <div class="co-ledger-row"><span>normalize transaction 000003</span><i></i><span>frontier teacher</span></div>
      <div class="co-ledger-row co-ledger-more"><span>&times; every request, forever</span><i></i><span class="co-ledger-cost">full price</span></div>
    </div>

    <div class="co-footer">&sect; SAME TASK, SAME PROMPT, SAME PRICE, EVERY TIME</div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap");
      [data-composition-id="cold-open"] { width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #f1eee6; color: #171714; }
      [data-composition-id="cold-open"] .co-rule { position: absolute; left: 80px; right: 80px; height: 1px; background: #d9d5ca; }
      [data-composition-id="cold-open"] .co-rule-t { top: 80px; }
      [data-composition-id="cold-open"] .co-rule-b { bottom: 80px; }
      [data-composition-id="cold-open"] .co-meta { position: absolute; font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #6d6a63; }
      [data-composition-id="cold-open"] .co-meta-tl { top: 48px; left: 80px; }
      [data-composition-id="cold-open"] .co-meta-tr { top: 48px; right: 80px; }
      [data-composition-id="cold-open"] .co-headline { position: absolute; top: 200px; left: 130px; right: 130px; font-family: "Newsreader", Georgia, serif; font-size: 96px; line-height: 1.08; letter-spacing: -0.02em; }
      [data-composition-id="cold-open"] .co-w { display: inline-block; margin-right: 22px; }
      [data-composition-id="cold-open"] .co-w-accent { font-style: italic; color: #d75a3d; }
      [data-composition-id="cold-open"] .co-ledger { position: absolute; top: 560px; left: 130px; width: 1100px; font-family: "JetBrains Mono", monospace; font-size: 22px; color: #171714; }
      [data-composition-id="cold-open"] .co-ledger-row { display: flex; align-items: baseline; gap: 18px; padding: 16px 0; border-bottom: 1px solid #d9d5ca; opacity: 0; }
      [data-composition-id="cold-open"] .co-ledger-row i { flex: 1; border-bottom: 1px dotted #d9d5ca; }
      [data-composition-id="cold-open"] .co-ledger-more { color: #6d6a63; }
      [data-composition-id="cold-open"] .co-ledger-cost { color: #d75a3d; font-weight: 600; }
      [data-composition-id="cold-open"] .co-footer { position: absolute; bottom: 48px; left: 80px; font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #6d6a63; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="cold-open"]');
        const words = root.querySelectorAll(".co-w");
        const rows = root.querySelectorAll(".co-ledger-row");
        gsap.set(words, { y: 18, opacity: 0 });
        words.forEach((w, i) => tl.to(w, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.25 + i * 0.09));
        rows.forEach((r, i) => tl.to(r, { opacity: 1, duration: 0.35, ease: "power2.out" }, 1.7 + i * 0.28));
        tl.to([...words, ...rows], { opacity: 0, y: -12, duration: 0.4, ease: "power2.in" }, 4.9);
        tl.set([...words, ...rows], { opacity: 0, visibility: "hidden" }, 5.3);
        tl.to({}, { duration: 5.5 }, 0);
        window.__timelines["cold-open"] = tl;
      })();
    </script>
  </div>
</template>
