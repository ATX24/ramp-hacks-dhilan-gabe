    <style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="code-reveal"]');
        const card = root.querySelector(".cr-card");
        const lines = root.querySelectorAll(".cr-line");
        const annots = root.querySelectorAll(".cr-annot");
        gsap.set(card, { y: 24, opacity: 0 });
        gsap.set(lines, { x: -10, opacity: 0 });
        gsap.set(annots, { x: -12, opacity: 0 });
        tl.to(card, { y: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 0.25);
        lines.forEach((l, i) => tl.to(l, { x: 0, opacity: 1, duration: 0.25, ease: "power2.out" }, 0.85 + i * 0.28));
        annots.forEach((a, i) => tl.to(a, { x: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, 3.4 + i * 0.9));
        tl.to([card, ...annots], { opacity: 0, duration: 0.45, ease: "power2.in" }, 8.3);
        tl.set([card, ...annots], { opacity: 0, visibility: "hidden" }, 8.8);
        tl.to({}, { duration: 9.0 }, 0);
        window.__timelines["code-reveal"] = tl;
      })();
