<template id="outro-template">

      [data-composition-id="outro"] .ou-rule-b { bottom: 80px; }

      [data-composition-id="outro"] .ou-meta-tl { top: 48px; left: 80px; }
      [data-composition-id="outro"] .ou-meta-tr { top: 48px; right: 80px; }

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="outro"]');
        const mark = root.querySelector(".ou-wordmark");
        const under = root.querySelector(".ou-underline");
        const cmd = root.querySelector(".ou-cmd");
        const caret = root.querySelector(".ou-caret");
        const tag = root.querySelector(".ou-tag");
        gsap.set(mark, { y: 16, opacity: 0 });
        tl.to(mark, { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 0.3);
        tl.to(under, { width: 560, duration: 0.55, ease: "power3.inOut" }, 0.8);
        tl.to(cmd, { opacity: 1, duration: 0.45, ease: "power2.out" }, 1.5);
        tl.to(caret, { opacity: 0, duration: 0.15, repeat: 5, yoyo: true, ease: "steps(1)" }, 2.0);
        tl.to(tag, { opacity: 1, duration: 0.45, ease: "power2.out" }, 2.3);
        tl.to({}, { duration: 5.0 }, 0);
        window.__timelines["outro"] = tl;
      })();
