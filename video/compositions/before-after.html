    <script>
      (function () {

        const root = document.querySelector('[data-composition-id="before-after"]');

        const verdicts = root.querySelectorAll(".ba-verdict");

        gsap.set(cards, { y: 20, opacity: 0 });
        tl.to(kicker, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.2);
        tl.to(cards[0], { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.7);

        tl.to(verdicts[0], { opacity: 1, duration: 0.35, ease: "power4.out" }, 2.4);
        tl.fromTo(cards[0], { x: 0 }, { x: -6, duration: 0.05, ease: "power2.inOut", yoyo: true, repeat: 3 }, 2.45);
        tl.to(spine, { opacity: 1, duration: 0.4, ease: "power2.out" }, 3.0);
        tl.to(cards[1], { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 3.3);
        goodLines.forEach((l, i) => tl.to(l, { opacity: 1, duration: 0.2, ease: "power2.out" }, 3.7 + i * 0.14));

        tl.to([kicker, ...cards, spine], { opacity: 0, duration: 0.45, ease: "power2.in" }, 7.8);
        tl.set([kicker, ...cards, spine], { opacity: 0, visibility: "hidden" }, 8.3);
        tl.to({}, { duration: 8.5 }, 0);
        window.__timelines["before-after"] = tl;
